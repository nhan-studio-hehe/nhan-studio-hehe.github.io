<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris 3D · phong cách khối</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at 20% 30%, #1a2f3f, #0b141c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .game-wrapper {
            background: #1e3a4a;
            padding: 2rem 2.5rem;
            border-radius: 3rem 3rem 2rem 2rem;
            box-shadow: 
                0 20px 30px rgba(0,0,0,0.7),
                inset 0 -3px 8px rgba(255,255,240,0.2),
                inset 0 3px 5px rgba(0,0,0,0.5);
            border-bottom: 6px solid #0f2c38;
        }
        .container {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        /* sân chơi với hiệu ứng depth */
        .play-area {
            background: #0b1b24;
            padding: 12px;
            border-radius: 32px;
            box-shadow: 
                inset 0 0 0 2px #5d7e8c,
                0 18px 15px -5px black,
                inset 0 -10px 15px #00000099;
        }
        canvas#board {
            display: block;
            width: 300px;
            height: 600px;
            border-radius: 24px;
            background: #10252e;
            box-shadow: 
                inset 0 0 25px #000000,
                0 0 0 3px #41758b,
                2px 8px 20px rgba(0,0,0,0.8);
            image-rendering: crisp-edges; /* giữ nét khối */
        }
        /* bảng thông tin */
        .info-panel {
            background: #17323f;
            border-radius: 2.2rem;
            padding: 1.5rem 1.8rem;
            box-shadow: 
                inset 0 2px 8px #b1d7e3,
                inset 0 -8px 8px #041016,
                0 18px 15px -5px black;
            color: #ddf4fd;
            min-width: 160px;
            text-shadow: 0 3px 3px black;
        }
        .next-piece {
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.2rem;
            background: #0e2935;
            padding: 0.5rem 1rem;
            border-radius: 3rem;
            margin-bottom: 2rem;
            box-shadow: inset 0 -4px 4px #2f4d5b;
        }
        canvas#nextCanvas {
            display: block;
            width: 120px;
            height: 120px;
            margin: 0.5rem auto 1.5rem;
            background: #0b1f28;
            border-radius: 30px;
            box-shadow: 
                inset 0 0 0 3px #3b6f80,
                0 8px 10px black;
            image-rendering: crisp-edges;
        }
        .score-box {
            background: #0c202a;
            border-radius: 2rem;
            padding: 0.8rem 1.2rem;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 1rem 0;
            box-shadow: inset 0 -3px 0 #60a5ba, inset 0 2px 10px #2b5a6b;
            color: #fbe9a0;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        button {
            background: #2e5b6e;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.6rem 0;
            border-radius: 3rem;
            color: #edf8ff;
            box-shadow: 0 7px 0 #0f2b33, 0 8px 12px black;
            cursor: pointer;
            transition: all 0.06s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #9ad4e6;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f2b33, 0 5px 10px black;
        }
        .footer-note {
            text-align: center;
            margin-top: 1.2rem;
            color: #aacad9;
            font-size: 0.9rem;
            text-shadow: 0 2px 2px black;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="container">
        <!-- khu vực chính -->
        <div class="play-area">
            <canvas id="board" width="300" height="600"></canvas>
        </div>

        <!-- side panel 3D style -->
        <div class="info-panel">
            <div class="next-piece">⏩ Tiếp theo</div>
            <canvas id="nextCanvas" width="120" height="120"></canvas>
            <div class="score-box">
                <span id="scoreDisplay">0</span>
            </div>
            <div class="controls">
                <button id="rotateBtn">↻ Xoay</button>
                <button id="newGameBtn">🆕 Mới</button>
            </div>
            <div class="footer-note">
                ← ↓ → / xoay
            </div>
        </div>
    </div>
</div>
<script>
    (function() {
        // --- KÍCH THƯỚC ---
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;      // canvas chính 300x600
        const NEXT_SIZE = 24;        // ô nhỏ cho next canvas (120/5 ≈ 24, dùng 24 cho đẹp)

        // --- LẤY CANVAS ---
        const boardCanvas = document.getElementById('board');
        const ctx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        // --- BIẾN STATE ---
        let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        let currentPiece = null;      // { shape, x, y }
        let nextPiece = null;
        let score = 0;
        let gameOver = false;
        let gameInterval = null;
        const BASE_INTERVAL = 500;    // 500ms

        // --- ĐỊNH NGHĨA CÁC KHỐI (TETROMINO) ---
        const PIECES = [
            // I
            { shape: [[1,1,1,1]], color: '#3ce0e8' },  // cyan
            // O
            { shape: [[1,1],[1,1]], color: '#f7e476' }, // vàng
            // T
            { shape: [[0,1,0],[1,1,1]], color: '#b484e0' }, // tím
            // S
            { shape: [[0,1,1],[1,1,0]], color: '#6fcf97' }, // xanh lá
            // Z
            { shape: [[1,1,0],[0,1,1]], color: '#e6675a' }, // đỏ cam
            // L
            { shape: [[1,0,0],[1,1,1]], color: '#ed9b5e' }, // cam
            // J
            { shape: [[0,0,1],[1,1,1]], color: '#5b8cff' }  // xanh dương
        ];

        // random piece
        function randomPiece() {
            const idx = Math.floor(Math.random() * PIECES.length);
            const piece = PIECES[idx];
            return {
                shape: piece.shape.map(row => [...row]), // copy
                color: piece.color
            };
        }

        // khởi tạo game
        function initGame() {
            grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            nextPiece = randomPiece();
            spawnNewPiece();
            score = 0;
            gameOver = false;
            updateScore();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameTick, BASE_INTERVAL);
            drawAll();
        }

        // sinh mảnh mới từ next và tạo next ngẫu nhiên
        function spawnNewPiece() {
            if (!nextPiece) {
                nextPiece = randomPiece();
            }
            // current nhận từ next, sau đó tạo next mới
            currentPiece = {
                shape: nextPiece.shape.map(row => [...row]),
                color: nextPiece.color,
                x: Math.floor((COLS - nextPiece.shape[0].length) / 2),
                y: 0
            };
            nextPiece = randomPiece();

            // nếu ngay khi spawn đã va chạm -> game over
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameOver = true;
                clearInterval(gameInterval);
                gameInterval = null;
            }
        }

        // kiểm tra va chạm với grid hoặc biên
        function collision(shape, offsetX, offsetY) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[0].length; c++) {
                    if (shape[r][c] !== 0) {
                        const boardX = offsetX + c;
                        const boardY = offsetY + r;
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
                            return true;
                        }
                        if (boardY >= 0 && grid[boardY][boardX] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // cố định mảnh hiện tại vào grid
        function mergePiece() {
            if (!currentPiece) return;
            for (let r = 0; r < currentPiece.shape.length; r++) {
                for (let c = 0; c < currentPiece.shape[0].length; c++) {
                    if (currentPiece.shape[r][c] !== 0) {
                        const boardY = currentPiece.y + r;
                        const boardX = currentPiece.x + c;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            // lưu màu dưới dạng mã (chuỗi) để vẽ 3D
                            grid[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
        }

        // xóa dòng đầy và cập nhật điểm
        function clearFullRows() {
            let rowsCleared = 0;
            for (let row = ROWS - 1; row >= 0; ) {
                let full = true;
                for (let col = 0; col < COLS; col++) {
                    if (grid[row][col] === 0) {
                        full = false;
                        break;
                    }
                }
                if (full) {
                    // xóa dòng
                    for (let r = row; r > 0; r--) {
                        grid[r] = [...grid[r-1]];
                    }
                    grid[0] = Array(COLS).fill(0);
                    rowsCleared++;
                    // không tăng row vì dòng mới kéo xuống
                } else {
                    row--;
                }
            }
            if (rowsCleared > 0) {
                score += rowsCleared * 100;
                updateScore();
            }
        }

        // di chuyển xuống, nếu không được thì merge + xóa dòng + spawn
        function moveDown() {
            if (!currentPiece || gameOver) return false;

            currentPiece.y++;
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                currentPiece.y--;
                mergePiece();
                clearFullRows();

                spawnNewPiece();
                if (gameOver) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
                drawAll();
                return false; // không di chuyển được
            }
            drawAll();
            return true;
        }

        // game tick
        function gameTick() {
            if (!gameOver && currentPiece) {
                moveDown();
            }
        }

        // di chuyển ngang
        function moveHoriz(dx) {
            if (!currentPiece || gameOver) return;
            currentPiece.x += dx;
            if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                currentPiece.x -= dx;
            }
            drawAll();
        }

        // xoay mảnh
        function rotatePiece() {
            if (!currentPiece || gameOver) return;
            // xoay theo chiều kim đồng hồ
            const oldShape = currentPiece.shape;
            const rotated = oldShape[0].map((_, idx) => oldShape.map(row => row[idx]).reverse());
            // kiểm tra khả năng xoay (có kick lùi đơn giản)
            if (!collision(rotated, currentPiece.x, currentPiece.y)) {
                currentPiece.shape = rotated;
            } else {
                // thử dịch trái / phải một ô (đơn giản)
                if (!collision(rotated, currentPiece.x - 1, currentPiece.y)) {
                    currentPiece.shape = rotated;
                    currentPiece.x -= 1;
                } else if (!collision(rotated, currentPiece.x + 1, currentPiece.y)) {
                    currentPiece.shape = rotated;
                    currentPiece.x += 1;
                }
                // nếu vẫn không được, giữ nguyên
            }
            drawAll();
        }

        // cập nhật điểm hiển thị
        function updateScore() {
            scoreSpan.textContent = score;
        }

        // --- VẼ VỚI HIỆU ỨNG 3D (bóng, viền nổi) ---
        function drawBlock(ctx, x, y, size, color) {
            // vẽ khối chính với hiệu ứng nổi
            ctx.fillStyle = color;
            ctx.fillRect(x, y, size, size);

            // viền sáng góc trên-trái (3D giả)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + size, y);
            ctx.lineTo(x, y + size);
            ctx.fill();

            // viền tối góc dưới-phải (tạo bóng đổ)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.moveTo(x + size, y);
            ctx.lineTo(x + size, y + size);
            ctx.lineTo(x, y + size);
            ctx.fill();

            // đường viền sáng mỏng bắt mắt
            ctx.strokeStyle = 'rgba(255, 255, 240, 0.7)';
            ctx.lineWidth = 2;
            ctx.strokeRect(x+1, y+1, size-2, size-2);
        }

        // vẽ toàn bộ (board + next + ...)
        function drawAll() {
            // vẽ board
            ctx.clearRect(0, 0, 300, 600);
            // lưới nền mờ (tạo chiều sâu)
            ctx.fillStyle = '#10252e';
            ctx.fillRect(0, 0, 300, 600);
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const color = grid[row][col];
                    if (color !== 0) {
                        drawBlock(ctx, col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, color);
                    } else {
                        // vẽ ô nổi rất nhẹ (grid)
                        ctx.fillStyle = '#1d3844';
                        ctx.fillRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE-0.5, BLOCK_SIZE-0.5);
                        ctx.fillStyle = '#15323d';
                        ctx.fillRect(col * BLOCK_SIZE+2, row * BLOCK_SIZE+2, BLOCK_SIZE-4, BLOCK_SIZE-4);
                    }
                }
            }

            // vẽ current piece (nếu chưa game over)
            if (currentPiece && !gameOver) {
                for (let r = 0; r < currentPiece.shape.length; r++) {
                    for (let c = 0; c < currentPiece.shape[0].length; c++) {
                        if (currentPiece.shape[r][c] !== 0) {
                            const x = (currentPiece.x + c) * BLOCK_SIZE;
                            const y = (currentPiece.y + r) * BLOCK_SIZE;
                            drawBlock(ctx, x, y, BLOCK_SIZE, currentPiece.color);
                        }
                    }
                }
            }

            // vẽ mảnh next
            nextCtx.clearRect(0, 0, 120, 120);
            nextCtx.fillStyle = '#0b1f28';
            nextCtx.fillRect(0, 0, 120, 120);
            if (nextPiece) {
                const shape = nextPiece.shape;
                const color = nextPiece.color;
                const cols = shape[0].length;
                const rows = shape.length;
                const offsetX = (5 - cols) * NEXT_SIZE / 2;  // căn giữa (vì next canvas 5 ô 24 = 120)
                const offsetY = (5 - rows) * NEXT_SIZE / 2;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (shape[r][c] !== 0) {
                            drawBlock(nextCtx, offsetX + c * NEXT_SIZE, offsetY + r * NEXT_SIZE, NEXT_SIZE, color);
                        }
                    }
                }
            }

            // nếu game over, vẽ chữ
            if (gameOver) {
                ctx.font = 'bold 28px "Segoe UI", sans-serif';
                ctx.fillStyle = '#f0f0e0';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 10;
                ctx.fillText('GAME OVER', 20, 300);
                ctx.shadowBlur = 0;
            }
        }

        // --- SỰ KIỆN BÀN PHÍM ---
        function handleKey(e) {
            e.preventDefault();
            if (gameOver) return;
            switch (e.key) {
                case 'ArrowLeft': moveHoriz(-1); break;
                case 'ArrowRight': moveHoriz(1); break;
                case 'ArrowDown': moveDown(); break;
                case 'ArrowUp': rotatePiece(); break;
                case ' ': // space cũng xoay cho dễ
                case 'Space':
                    e.preventDefault();
                    rotatePiece();
                    break;
                default: return;
            }
        }

        // chặn phím cuộn trang
        window.addEventListener('keydown', function(e) {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
                if (!gameOver) handleKey(e);
            }
        });

        // nút bấm
        document.getElementById('rotateBtn').addEventListener('click', () => rotatePiece());
        document.getElementById('newGameBtn').addEventListener('click', () => {
            if (gameInterval) clearInterval(gameInterval);
            initGame();
            drawAll();
        });

        // bắt đầu game
        initGame();
    })();
</script>
</body>
</html>
